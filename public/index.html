<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本マイクロソフト サポート BLOG 最新情報</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-card: #f8f9fa;
      --text: #1a1a2e;
      --text-sub: #555;
      --accent: #0078d4;
      --accent-hover: #106ebe;
      --border: #e0e0e0;
      --tag-bg: #e8f4fd;
      --tag-text: #0078d4;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --text: #eaeaea;
      --text-sub: #aaa;
      --accent: #4fc3f7;
      --accent-hover: #81d4fa;
      --border: #2a2a4a;
      --tag-bg: #1e3a5f;
      --tag-text: #4fc3f7;
    }
    [data-theme="sakura"] {
      --bg: #fef8fa;
      --bg-card: #fdf2f5;
      --text: #4a2030;
      --text-sub: #8a5068;
      --accent: #c44d78;
      --accent-hover: #a83d64;
      --border: #f0c4d0;
      --tag-bg: #fce4ec;
      --tag-text: #c44d78;
    }
    [data-theme="mint"] {
      --bg: #f5fcf9;
      --bg-card: #e8f5f0;
      --text: #1b4332;
      --text-sub: #52796f;
      --accent: #2e8b6f;
      --accent-hover: #24705a;
      --border: #b2dfdb;
      --tag-bg: #c8f0e4;
      --tag-text: #2e8b6f;
    }
    [data-theme="lavender"] {
      --bg: #faf7fd;
      --bg-card: #f3edf7;
      --text: #311b52;
      --text-sub: #6b5280;
      --accent: #7e57c2;
      --accent-hover: #6a45ad;
      --border: #d1c4e9;
      --tag-bg: #ede7f6;
      --tag-text: #7e57c2;
    }
    [data-theme="peach"] {
      --bg: #fffaf5;
      --bg-card: #fff3e8;
      --text: #4e2a0a;
      --text-sub: #8d5e3c;
      --accent: #e67e4a;
      --accent-hover: #d06a38;
      --border: #ffccbc;
      --tag-bg: #ffe8d6;
      --tag-text: #e67e4a;
    }
    [data-theme="sky"] {
      --bg: #f5fafd;
      --bg-card: #e8f4fc;
      --text: #0d2b45;
      --text-sub: #4a7a9b;
      --accent: #2196c4;
      --accent-hover: #1a7ba3;
      --border: #b3d9f2;
      --tag-bg: #d6edfa;
      --tag-text: #2196c4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 1rem; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header .meta { font-size: 0.8rem; color: var(--text-sub); }
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .theme-picker-wrap {
      position: relative;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      color: var(--text);
      font-size: 0.85rem;
    }
    .theme-palette {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
      gap: 4px;
      grid-template-columns: repeat(4, 1fr);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 100;
    }
    .theme-palette.open { display: grid; }
    .theme-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 0.4rem 0.5rem;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1.1rem;
    }
    .theme-swatch:hover { background: var(--bg); }
    .theme-swatch.active { border-color: var(--accent); background: var(--bg); }
    .theme-swatch-label { font-size: 0.6rem; color: var(--text-sub); white-space: nowrap; }
    .tabs {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .tab {
      padding: 0.4rem 0.8rem;
      border: none;
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .tab:hover { background: var(--bg-card); }
    .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.9rem;
    }
    .feed-list { list-style: none; }
    .feed-item {
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.75rem;
      background: var(--bg-card);
      transition: box-shadow 0.2s;
    }
    .feed-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .feed-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .feed-item-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .feed-item-title a { color: var(--accent); text-decoration: none; }
    .feed-item-title a:hover { text-decoration: underline; color: var(--accent-hover); }
    .feed-item-date { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; }
    .feed-item-summary { font-size: 0.85rem; color: var(--text-sub); margin-top: 0.4rem; }
    .feed-item-blog {
      display: inline-block;
      font-size: 0.75rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-top: 0.4rem;
    }
    .feed-item-blog a { color: inherit; text-decoration: none; }
    .feed-item-blog a:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 3rem; color: var(--text-sub); }
    .error { text-align: center; padding: 2rem; color: #e74c3c; }
    .status-bar {
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-bottom: 1rem;
    }
    footer { text-align: center; padding: 2rem 0; font-size: 0.8rem; color: var(--text-sub); border-top: 1px solid var(--border); margin-top: 2rem; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      .feed-item-header { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>日本マイクロソフト サポート BLOG 最新情報</h1>
        <div class="meta" id="generated-at"></div>
      </div>
      <div class="theme-picker-wrap">
        <button class="theme-toggle" id="theme-toggle">🎨</button>
        <div class="theme-palette" id="theme-palette"></div>
      </div>
    </header>

    <div class="controls">
      <input type="search" class="search-box" id="search" placeholder="記事を検索...">
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="status-bar" id="status-bar"></div>
    <ul class="feed-list" id="feed-list">
      <li class="loading">読み込み中...</li>
    </ul>

    <footer>
      <p>データソース: <a href="https://cssjpn.github.io/" style="color:var(--accent)">日本マイクロソフト サポート情報</a></p>
      <p>各ブログの Atom フィードを定期的に取得して表示しています</p>
    </footer>
  </div>

  <script>
    const DATA_URL = "./data/feeds.json";
    let allItems = [];
    let categories = [];
    let activeTab = "all";

    // Theme
    const themes = [
      { id: "light", icon: "☀️", label: "ライト" },
      { id: "dark", icon: "🌙", label: "ダーク" },
      { id: "sakura", icon: "🌸", label: "桜" },
      { id: "mint", icon: "🍃", label: "ミント" },
      { id: "lavender", icon: "💜", label: "ラベンダー" },
      { id: "peach", icon: "🍑", label: "ピーチ" },
      { id: "sky", icon: "🌤️", label: "そら" },
    ];
    const themeBtn = document.getElementById("theme-toggle");
    const palette = document.getElementById("theme-palette");
    let currentThemeId = "light";
    const saved = localStorage.getItem("theme");
    if (saved && themes.some((t) => t.id === saved)) {
      currentThemeId = saved;
    } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      currentThemeId = "dark";
    }
    document.documentElement.setAttribute("data-theme", currentThemeId);

    function buildPalette() {
      palette.innerHTML = themes.map((t) =>
        `<div class="theme-swatch ${t.id === currentThemeId ? "active" : ""}" data-theme-id="${t.id}">
          <span>${t.icon}</span><span class="theme-swatch-label">${t.label}</span>
        </div>`
      ).join("");
    }
    buildPalette();

    themeBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      palette.classList.toggle("open");
    });
    palette.addEventListener("click", (e) => {
      const swatch = e.target.closest(".theme-swatch");
      if (!swatch) return;
      currentThemeId = swatch.dataset.themeId;
      document.documentElement.setAttribute("data-theme", currentThemeId);
      localStorage.setItem("theme", currentThemeId);
      buildPalette();
      palette.classList.remove("open");
    });
    document.addEventListener("click", () => palette.classList.remove("open"));

    // Search
    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", render);

    // Fetch data
    fetch(DATA_URL)
      .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then((data) => {
        allItems = data.items;
        categories = data.categories;
        document.getElementById("generated-at").textContent = `最終更新: ${new Date(data.generatedAt).toLocaleString("ja-JP")}`;
        buildTabs();
        render();
      })
      .catch((err) => {
        document.getElementById("feed-list").innerHTML = `<li class="error">データの読み込みに失敗しました: ${err.message}</li>`;
      });

    function buildTabs() {
      const tabsEl = document.getElementById("tabs");
      const tabs = [{ id: "all", name: "すべて" }, ...categories];
      tabsEl.innerHTML = tabs.map((t) =>
        `<button class="tab ${t.id === activeTab ? "active" : ""}" data-tab="${t.id}">${t.name}</button>`
      ).join("");
      tabsEl.addEventListener("click", (e) => {
        if (e.target.classList.contains("tab")) {
          activeTab = e.target.dataset.tab;
          tabsEl.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
          e.target.classList.add("active");
          render();
        }
      });
    }

    function render() {
      const query = searchInput.value.toLowerCase();
      let items = allItems;
      if (activeTab !== "all") {
        items = items.filter((i) => i.category === activeTab);
      }
      if (query) {
        items = items.filter((i) =>
          i.title.toLowerCase().includes(query) ||
          i.summary.toLowerCase().includes(query) ||
          i.blog.toLowerCase().includes(query)
        );
      }

      document.getElementById("status-bar").textContent = `${items.length} 件の記事`;

      const listEl = document.getElementById("feed-list");
      if (items.length === 0) {
        listEl.innerHTML = `<li class="loading">該当する記事がありません</li>`;
        return;
      }

      listEl.innerHTML = items.slice(0, 100).map((item) => {
        const date = item.date ? new Date(item.date).toLocaleDateString("ja-JP") : "";
        return `<li class="feed-item">
          <div class="feed-item-header">
            <div class="feed-item-title"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a></div>
            <div class="feed-item-date">${date}</div>
          </div>
          ${item.summary ? `<div class="feed-item-summary">${escapeHtml(item.summary)}</div>` : ""}
          <span class="feed-item-blog"><a href="${escapeHtml(item.blogUrl)}" target="_blank" rel="noopener">${escapeHtml(item.blog)}</a></span>
        </li>`;
      }).join("");
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
